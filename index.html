<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas tarefas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved (or OS) theme before first paint to avoid a flash of
      // the wrong theme. Kept ternary-free per project rule #3.
      (function () {
        try {
          var stored = localStorage.getItem("todo-list-personal:theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          var useDark = false;
          if (stored === "dark") {
            useDark = true;
          } else if (stored === null && prefersDark) {
            useDark = true;
          }
          if (useDark) {
            document.documentElement.classList.add("dark");
          }
        } catch (error) {
          /* localStorage may be unavailable; fall back to the light theme. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
